name: Refresh Generated Reports

# LOC_REPORT.md and docs/diagrams/* are derived from the whole source tree, so
# committing them into `main` caused constant merge conflicts and stale
# freshness-check failures. Instead of merging them back, this workflow
# publishes them to a single long-lived branch — `automated/reports` — that
# always mirrors the current default branch with the freshly regenerated
# reports committed on top.
#
# The branch is rebuilt from `origin/main` and force-pushed in place on every
# run, so:
#   * there is exactly ONE report branch (no per-run
#     `automated/refresh-reports-<run id>` branches piling up), and
#   * checking it out always shows reports current as of the latest `main`.
#
# No pull request is opened: the branch is the published artifact, not
# something merged into `main` (which no longer tracks these generated files).

on:
  schedule:
    # 06:17 UTC daily. Off the hour to avoid GitHub's top-of-hour scheduling
    # congestion (which can delay or drop cron runs).
    - cron: "17 6 * * *"
  workflow_dispatch: {}

# Only one refresh at a time; a newer run supersedes an in-flight one.
concurrency:
  group: refresh-reports
  cancel-in-progress: false

permissions:
  contents: write

env:
  # The single long-lived branch this job force-updates with current reports.
  REPORTS_BRANCH: automated/reports
  GH_TOKEN: ${{ github.token }}

jobs:
  refresh:
    name: Regenerate LOC report and dependency diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the reports branch can be rebuilt from origin/main.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install d2 (renders the dependency-diagram SVGs)
        # Without d2 on PATH, generate_dependency_diagrams.py silently skips SVG
        # rendering and emits only graph.json, so the published reports branch
        # would carry no rendered diagrams. Install it so the SVGs are produced.
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Publish regenerated reports to the single reports branch
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Rebuild the reports branch from a pristine mirror of the branch this
          # workflow ran on (the default branch). Rebuilding from scratch each
          # run means the branch never accumulates history and always reflects
          # the latest main — it mirrors main plus the current reports.
          git switch -C "$REPORTS_BRANCH" "origin/${GITHUB_REF_NAME}"

          python scripts/generate_loc_report.py
          python scripts/generate_dependency_diagrams.py

          if [ -z "$(git status --porcelain -- LOC_REPORT.md docs/diagrams)" ]; then
            echo "Reports already current for ${GITHUB_REF_NAME}@$(git rev-parse --short HEAD); branch just mirrors main."
          else
            echo "Detected report changes:"
            git status --porcelain -- LOC_REPORT.md docs/diagrams
            git add LOC_REPORT.md docs/diagrams
            git commit -m "chore: refresh LOC report and dependency diagrams"
          fi

          # Force-update the single reports branch in place. The branch always
          # equals current main (+ the generated reports), never merged back.
          git push --force origin "$REPORTS_BRANCH"
